<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hello World</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      align-items: center;
      display: grid;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
      background: #f7f7f4;
      color: #1f2933;
    }

    main {
      max-width: 680px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      line-height: 1;
      margin: 0 0 16px;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0;
    }

    a {
      color: inherit;
      font-weight: 700;
      text-underline-offset: 0.2em;
    }

    @media (prefers-color-scheme: dark) {
      body {
        background: #111827;
        color: #f9fafb;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Hello, world.</h1>
    <p>This is a standalone static page served by Hugo at <a href="/projects/hello-world/">/projects/hello-world/</a>.</p>
  </main>
</body>
</html>
