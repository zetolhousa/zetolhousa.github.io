<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Focus Notes</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f5ef;
      --surface: #fffcf5;
      --surface-soft: #f0eee5;
      --text: #20211d;
      --muted: #6e7168;
      --line: #ddd8cb;
      --accent: #2f6f73;
      --accent-dark: #214f52;
      --complete: #60725c;
      --shadow: 0 18px 60px rgba(42, 39, 30, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.44), rgba(255, 255, 255, 0)),
        var(--bg);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.52;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .app {
      width: min(900px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      padding: clamp(20px, 4vw, 48px);
    }

    .capture-panel {
      padding: 0;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(1.9rem, 4.5vw, 3rem);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lede {
      max-width: 30rem;
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .app-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(210px, 260px);
      gap: clamp(18px, 4vw, 36px);
      align-items: start;
      margin-bottom: clamp(28px, 6vw, 56px);
    }

    .timer-dock {
      justify-self: end;
      width: 100%;
      padding-top: 4px;
      color: var(--muted);
    }

    .timer-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 10px;
    }

    .timer {
      min-width: 82px;
      margin: 0;
      font-variant-numeric: tabular-nums;
      font-size: 1.72rem;
      font-weight: 720;
      line-height: 1;
      letter-spacing: 0;
      color: var(--text);
      text-align: right;
    }

    .status {
      display: block;
      min-height: 1.4em;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.86rem;
      line-height: 1.5;
    }

    .status.complete {
      color: var(--accent-dark);
      font-weight: 700;
    }

    .session-settings {
      border-top: 1px solid transparent;
      text-align: right;
    }

    .session-settings summary {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.9rem;
      list-style: none;
      text-underline-offset: 0.2em;
    }

    .session-settings summary::-webkit-details-marker {
      display: none;
    }

    .session-settings summary:hover {
      color: var(--text);
      text-decoration: underline;
    }

    .session-settings[open] {
      padding-top: 10px;
      border-top-color: var(--line);
    }

    .app.session-active .session-settings {
      margin-top: 2px;
    }

    .app.session-active .session-settings summary {
      justify-content: flex-end;
      font-size: 0.82rem;
      opacity: 0.72;
    }

    .app.session-active .session-settings[open] {
      opacity: 1;
    }

    .intervals {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 14px 0 10px;
    }

    .interval {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
    }

    .interval[aria-pressed="true"] {
      border-color: var(--accent);
      background: #e0efec;
      color: var(--accent-dark);
      font-weight: 700;
    }

    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
    }

    .primary,
    .secondary {
      min-height: 42px;
      border-radius: 8px;
      font-weight: 700;
    }

    .task-form .primary {
      min-width: 74px;
    }

    .timer-dock .primary,
    .timer-dock .secondary {
      min-height: 36px;
      padding: 0 12px;
    }

    .primary {
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
    }

    .secondary {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
    }

    .secondary:hover,
    .interval:hover {
      border-color: #b7afa0;
      background: #f7f2e8;
    }

    .section-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 14px;
    }

    h2 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .counter {
      color: var(--muted);
      font-size: 0.9rem;
      white-space: nowrap;
    }

    .task-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      margin-bottom: 14px;
    }

    .task-form input,
    .task input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
    }

    .task-form input {
      min-height: 48px;
      padding: 0 14px;
    }

    .task-form input:focus,
    .task input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(47, 111, 115, 0.14);
    }

    .task-list {
      display: grid;
      gap: 8px;
      min-height: 48px;
      margin: 0 0 36px;
      padding: 0;
      list-style: none;
    }

    .empty {
      margin: 0;
      padding: 16px 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .task {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr) 36px;
      gap: 10px;
      align-items: center;
      min-height: 48px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 252, 245, 0.72);
    }

    .task input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0 auto;
      accent-color: var(--complete);
    }

    .task input[type="text"] {
      min-height: 34px;
      padding: 0 8px;
      border-color: transparent;
      background: transparent;
    }

    .task.done input[type="text"] {
      color: var(--muted);
      text-decoration: line-through;
    }

    .icon-button {
      width: 34px;
      height: 34px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
      line-height: 1;
    }

    .icon-button:hover {
      border-color: var(--line);
      background: var(--surface-soft);
      color: var(--text);
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      color: var(--muted);
      font-size: 0.86rem;
    }

    @media (max-width: 820px) {
      .app-header {
        grid-template-columns: 1fr;
        margin-bottom: 32px;
      }

      .timer-dock {
        justify-self: stretch;
      }

      .timer-row {
        justify-content: space-between;
      }

      .session-settings {
        text-align: left;
      }
    }

    @media (max-width: 520px) {
      .app {
        padding: 14px;
      }

      .task-form {
        grid-template-columns: 1fr;
      }

      .timer-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
      }

      .intervals {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .task {
        grid-template-columns: 28px minmax(0, 1fr) 34px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="capture-panel" aria-labelledby="app-title">
      <header class="app-header">
        <div>
          <p class="eyebrow">Focus Notes</p>
          <h1 id="app-title">Clear the next things.</h1>
          <p class="lede">Set a quiet window, let the noise settle, and write only what needs attention.</p>
        </div>

        <section class="timer-dock" aria-label="Focus timer">
          <div class="timer-row">
            <div class="timer" data-testid="timer-display" aria-live="polite">10:00</div>
            <button class="primary" type="button" data-testid="toggle-timer">Start</button>
            <button class="secondary" type="button" data-testid="reset-timer">Reset</button>
          </div>
          <span class="status" data-testid="timer-status">Ready when you are.</span>

          <details class="session-settings" data-testid="session-settings" open>
            <summary data-testid="session-summary">Choose session length</summary>
            <div class="intervals" aria-label="Timer intervals" data-testid="intervals">
              <button class="interval" type="button" data-minutes="5">5m</button>
              <button class="interval" type="button" data-minutes="10">10m</button>
              <button class="interval" type="button" data-minutes="15">15m</button>
              <button class="interval" type="button" data-minutes="25">25m</button>
            </div>
          </details>
        </section>
      </header>

      <div class="section-title">
        <h2 id="tasks-title">Tasks</h2>
        <span class="counter" data-testid="task-counter">0 open</span>
      </div>

      <form class="task-form" data-testid="task-form">
        <label class="sr-only" for="new-task">New task</label>
        <input id="new-task" data-testid="new-task" type="text" autocomplete="off" placeholder="Add one thing">
        <button class="primary" type="submit">Add</button>
      </form>

      <ul class="task-list" data-testid="task-list"></ul>

      <div class="meta-row">
        <span data-testid="save-state">Saved locally</span>
        <button class="secondary" type="button" data-testid="clear-completed">Clear completed</button>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = "focus-notes.v1";
    const DEFAULT_INTERVAL = 10;
    const INTERVALS = [5, 10, 15, 25];

    const elements = {
      app: document.querySelector(".app"),
      timer: document.querySelector("[data-testid='timer-display']"),
      status: document.querySelector("[data-testid='timer-status']"),
      sessionSettings: document.querySelector("[data-testid='session-settings']"),
      sessionSummary: document.querySelector("[data-testid='session-summary']"),
      intervals: Array.from(document.querySelectorAll("[data-minutes]")),
      toggleTimer: document.querySelector("[data-testid='toggle-timer']"),
      resetTimer: document.querySelector("[data-testid='reset-timer']"),
      taskForm: document.querySelector("[data-testid='task-form']"),
      newTask: document.querySelector("[data-testid='new-task']"),
      taskList: document.querySelector("[data-testid='task-list']"),
      taskCounter: document.querySelector("[data-testid='task-counter']"),
      saveState: document.querySelector("[data-testid='save-state']"),
      clearCompleted: document.querySelector("[data-testid='clear-completed']")
    };

    let state = loadState();
    let timerHandle = null;
    let saveHandle = null;

    function loadState() {
      const fallback = {
        interval: DEFAULT_INTERVAL,
        remainingSeconds: DEFAULT_INTERVAL * 60,
        running: false,
        endsAt: null,
        finished: false,
        tasks: []
      };

      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!saved || typeof saved !== "object") return fallback;

        const interval = INTERVALS.includes(Number(saved.interval)) ? Number(saved.interval) : DEFAULT_INTERVAL;
        const maxSeconds = interval * 60;
        const running = Boolean(saved.running && saved.endsAt);
        const remainingFromEnd = running ? Math.ceil((Number(saved.endsAt) - Date.now()) / 1000) : Number(saved.remainingSeconds);
        const remainingSeconds = clampSeconds(Number.isFinite(remainingFromEnd) ? remainingFromEnd : maxSeconds, maxSeconds);
        const finished = running ? remainingSeconds <= 0 : Boolean(saved.finished && remainingSeconds <= 0);

        return {
          interval,
          remainingSeconds: finished ? 0 : remainingSeconds,
          running: running && remainingSeconds > 0,
          endsAt: running && remainingSeconds > 0 ? Number(saved.endsAt) : null,
          finished,
          tasks: Array.isArray(saved.tasks) ? saved.tasks.filter(isValidTask) : []
        };
      } catch (error) {
        return fallback;
      }
    }

    function isValidTask(task) {
      return task && typeof task.id === "string" && typeof task.text === "string";
    }

    function clampSeconds(seconds, maxSeconds) {
      return Math.max(0, Math.min(maxSeconds, Math.round(seconds)));
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      elements.saveState.textContent = "Saved locally";
    }

    function queueSave() {
      elements.saveState.textContent = "Saving";
      window.clearTimeout(saveHandle);
      saveHandle = window.setTimeout(saveState, 120);
    }

    function formatTime(totalSeconds) {
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function isSessionActive() {
      return state.running || state.finished || state.remainingSeconds < state.interval * 60;
    }

    function getFullscreenElement() {
      return document.fullscreenElement || document.webkitFullscreenElement || null;
    }

    function enterFullscreen() {
      const target = document.documentElement;
      const request = target.requestFullscreen || target.webkitRequestFullscreen;
      if (!request || getFullscreenElement()) return;

      const result = request.call(target);
      if (result && typeof result.catch === "function") {
        result.catch(() => {});
      }
    }

    function exitFullscreen() {
      const exit = document.exitFullscreen || document.webkitExitFullscreen;
      if (!exit || !getFullscreenElement()) return;

      const result = exit.call(document);
      if (result && typeof result.catch === "function") {
        result.catch(() => {});
      }
    }

    function renderTimer() {
      const sessionActive = isSessionActive();
      elements.timer.textContent = formatTime(state.remainingSeconds);
      elements.status.classList.toggle("complete", state.finished);
      elements.app.classList.toggle("session-active", sessionActive);
      elements.sessionSummary.textContent = sessionActive ? `${state.interval}m session` : "Choose session length";

      if (!sessionActive) {
        elements.sessionSettings.open = true;
      } else if (state.running) {
        elements.sessionSettings.open = false;
      }

      if (state.finished) {
        elements.status.textContent = "Time is complete. Keep what matters.";
      } else if (state.running) {
        elements.status.textContent = "Stay with this window.";
      } else if (state.remainingSeconds < state.interval * 60) {
        elements.status.textContent = "Paused.";
      } else {
        elements.status.textContent = "Ready when you are.";
      }

      elements.toggleTimer.textContent = state.running ? "Pause" : "Start";
      elements.intervals.forEach((button) => {
        const isSelected = Number(button.dataset.minutes) === state.interval;
        button.setAttribute("aria-pressed", String(isSelected));
        button.disabled = state.running;
      });
    }

    function renderTasks() {
      elements.taskList.innerHTML = "";

      if (state.tasks.length === 0) {
        const empty = document.createElement("li");
        empty.className = "empty";
        empty.textContent = "Nothing captured yet.";
        elements.taskList.append(empty);
      } else {
        state.tasks.forEach((task) => {
          elements.taskList.append(createTaskElement(task));
        });
      }

      const openCount = state.tasks.filter((task) => !task.done).length;
      elements.taskCounter.textContent = `${openCount} open`;
      elements.clearCompleted.disabled = !state.tasks.some((task) => task.done);
    }

    function createTaskElement(task) {
      const item = document.createElement("li");
      item.className = `task${task.done ? " done" : ""}`;
      item.dataset.taskId = task.id;

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.checked = Boolean(task.done);
      checkbox.setAttribute("aria-label", "Complete task");
      checkbox.addEventListener("change", () => {
        task.done = checkbox.checked;
        renderTasks();
        queueSave();
      });

      const input = document.createElement("input");
      input.type = "text";
      input.value = task.text;
      input.setAttribute("aria-label", "Task text");
      input.addEventListener("input", () => {
        task.text = input.value;
        queueSave();
      });
      input.addEventListener("blur", () => {
        task.text = input.value.trim();
        if (!task.text) {
          state.tasks = state.tasks.filter((candidate) => candidate.id !== task.id);
        }
        renderTasks();
        queueSave();
      });

      const remove = document.createElement("button");
      remove.className = "icon-button";
      remove.type = "button";
      remove.textContent = "x";
      remove.setAttribute("aria-label", "Remove task");
      remove.addEventListener("click", () => {
        state.tasks = state.tasks.filter((candidate) => candidate.id !== task.id);
        renderTasks();
        queueSave();
      });

      item.append(checkbox, input, remove);
      return item;
    }

    function render() {
      renderTimer();
      renderTasks();
    }

    function setIntervalMinutes(minutes) {
      if (state.running || !INTERVALS.includes(minutes)) return;
      state.interval = minutes;
      state.remainingSeconds = minutes * 60;
      state.finished = false;
      state.endsAt = null;
      renderTimer();
      queueSave();
    }

    function startTimer() {
      if (state.remainingSeconds <= 0 || state.finished) {
        state.remainingSeconds = state.interval * 60;
        state.finished = false;
      }

      enterFullscreen();
      state.running = true;
      state.endsAt = Date.now() + state.remainingSeconds * 1000;
      elements.sessionSettings.open = false;
      startTicking();
      tick();
      queueSave();
    }

    function pauseTimer() {
      syncRemaining();
      state.running = false;
      state.endsAt = null;
      stopTicking();
      renderTimer();
      queueSave();
    }

    function resetTimer() {
      state.running = false;
      state.finished = false;
      state.endsAt = null;
      state.remainingSeconds = state.interval * 60;
      elements.sessionSettings.open = true;
      stopTicking();
      exitFullscreen();
      renderTimer();
      queueSave();
    }

    function syncRemaining() {
      if (!state.running || !state.endsAt) return;
      state.remainingSeconds = Math.max(0, Math.ceil((state.endsAt - Date.now()) / 1000));
    }

    function tick() {
      syncRemaining();

      if (state.running && state.remainingSeconds <= 0) {
        state.running = false;
        state.finished = true;
        state.endsAt = null;
        stopTicking();
        exitFullscreen();
        saveState();
      }

      renderTimer();
    }

    function startTicking() {
      stopTicking();
      timerHandle = window.setInterval(tick, 250);
    }

    function stopTicking() {
      if (timerHandle) {
        window.clearInterval(timerHandle);
        timerHandle = null;
      }
    }

    function createId() {
      if (window.crypto && typeof window.crypto.randomUUID === "function") {
        return window.crypto.randomUUID();
      }
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    elements.intervals.forEach((button) => {
      button.addEventListener("click", () => setIntervalMinutes(Number(button.dataset.minutes)));
    });

    elements.toggleTimer.addEventListener("click", () => {
      if (state.running) {
        pauseTimer();
      } else {
        startTimer();
      }
    });

    elements.resetTimer.addEventListener("click", resetTimer);

    elements.taskForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const text = elements.newTask.value.trim();
      if (!text) return;

      state.tasks.unshift({ id: createId(), text, done: false });
      elements.newTask.value = "";
      renderTasks();
      queueSave();
    });

    elements.clearCompleted.addEventListener("click", () => {
      state.tasks = state.tasks.filter((task) => !task.done);
      renderTasks();
      queueSave();
    });

    window.addEventListener("beforeunload", () => {
      if (state.running) syncRemaining();
      saveState();
    });

    render();
    if (state.running) startTicking();
  </script>
</body>
</html>
